<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Kuddos password reset — continue to the secure form">
	<title>Reset password — Kuddos</title>

	<link rel="shortcut icon" href="../../images/favicon.ico" type="image/x-icon">
	<link rel="icon" href="../../images/favicon.ico" type="image/x-icon">

	<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

	<style>
		:root {
			--kudos-dark: #0f1e20;
			--kudos-green: #4c8861;
			--kudos-text: #2e3b3d;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			font-family: "Poppins", sans-serif;
			color: var(--kudos-text);
			background: #f4f6f5;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.kudos-header {
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(8px);
			border-bottom: 1px solid #edf2f2;
		}

		.kudos-nav {
			max-width: 1240px;
			margin: 0 auto;
			padding: 18px 24px;
		}

		.kudos-logo a { display: block; }

		.kudos-logo-img { height: 46px; width: auto; }

		.kudos-main {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 40px 20px 60px;
		}

		.reset-card {
			width: 100%;
			max-width: 440px;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 8px 32px rgba(15, 30, 32, 0.08);
			padding: 32px 28px 28px;
		}

		.reset-card h1 {
			font-family: "DM Serif Display", serif;
			font-size: clamp(26px, 4vw, 34px);
			font-weight: 400;
			color: var(--kudos-dark);
			margin: 0 0 12px;
			line-height: 1.15;
		}

		.reset-lead {
			margin: 0 0 20px;
			font-size: 15px;
			line-height: 1.55;
			color: #5a6a6c;
		}

		.back-home {
			display: inline-block;
			margin-top: 8px;
			font-size: 14px;
			font-weight: 500;
			color: var(--kudos-green);
			text-decoration: none;
		}

		.back-home:hover { text-decoration: underline; }

		.fallback-link {
			display: block;
			margin-top: 20px;
			font-size: 14px;
			word-break: break-all;
		}

		.fallback-link a {
			color: var(--kudos-green);
		}

		.kudos-footer {
			padding: 32px 24px;
			background: #231f20;
			color: rgba(236, 242, 240, 0.76);
			font-size: 13px;
			text-align: center;
		}

		.kudos-footer a { color: rgba(236, 242, 240, 0.9); }
	</style>
</head>
<body>
	<header class="kudos-header">
		<div class="kudos-nav">
			<div class="kudos-logo">
				<a href="/" aria-label="Kuddos home">
					<img src="../../images/splash_logo_n.png" alt="Kuddos" class="kudos-logo-img">
				</a>
			</div>
		</div>
	</header>

	<main class="kudos-main">
		<div class="reset-card">
			<div id="panel-no-token" hidden>
				<h1>Link not valid</h1>
				<p class="reset-lead">Open the password reset link from your email, or request a new reset from the Kuddos app.</p>
				<a class="back-home" href="/">← Back to kuddos.me</a>
			</div>

			<div id="panel-redirect" hidden>
				<h1>Continue to reset password</h1>
				<p class="reset-lead" id="redirect-status">Opening the secure form…</p>
				<p class="fallback-link" id="fallback-wrap" hidden>
					If nothing happens, <a id="fallback-href" href="#">open this link</a>.
				</p>
			</div>
		</div>
	</main>

	<footer class="kudos-footer">
		<span>2026 @ Kuddos LLC · </span>
		<a href="../../privacy/">Privacy</a>
		<span> · </span>
		<a href="../../terms/">Terms</a>
		<span> · </span>
		<a href="mailto:support@kuddos.me">support@kuddos.me</a>
	</footer>

	<script>
		(function () {
			// Backend serves HTML for GET /UpdatePassword?forgetToken=… (form + step-two flow).
			var BACKEND_BASE = "https://eggbox.kuddos.me/UpdatePassword";

			var params = new URLSearchParams(window.location.search);
			var forgetToken = params.get("forgetToken");
			if (!forgetToken) {
				forgetToken = params.get("forget_token");
			}

			var panelNo = document.getElementById("panel-no-token");
			var panelGo = document.getElementById("panel-redirect");
			var statusEl = document.getElementById("redirect-status");
			var fallbackWrap = document.getElementById("fallback-wrap");
			var fallbackHref = document.getElementById("fallback-href");

			if (!forgetToken) {
				panelNo.hidden = false;
				return;
			}

			var dest = BACKEND_BASE + (window.location.search || ("?forgetToken=" + encodeURIComponent(forgetToken)));
			panelGo.hidden = false;
			fallbackHref.setAttribute("href", dest);
			fallbackWrap.hidden = false;

			window.location.replace(dest);
		})();
	</script>
</body>
</html>
